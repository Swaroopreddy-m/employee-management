<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h3 th:text="${pageType} + ' PAGE'"></h3>

<!-- ACKNOWLEDGE PAGE -->
<table th:if="${pageType == 'ACKNOWLEDGE'}" border="1">
    <tr th:each="f : ${fields}">
        <td th:text="${f.name}"></td>
        <td th:text="'VALUE'"></td>
    </tr>
</table>

<!-- CAPTURE & CONFIRM -->
<div th:if="${pageType != 'ACKNOWLEDGE'}">
    <div th:each="f : ${fields}">

        <!-- DISPLAY FIELD -->
        <input th:if="${f.visibility == 'D'}"
               type="text"
               th:style="'width:' + ${f.width}"
               th:readonly="${pageType == 'CONFIRM'}"/>

        <!-- HIDDEN FIELD -->
        <input th:if="${f.visibility == 'H'}"
               type="hidden"
               th:readonly="${pageType == 'CONFIRM'}"/>

    </div>
</div>

</body>
</html>
